<!DOCTYPE html>
<html lang="{{ site.language | default('es') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ site.description | default('') }}{% endblock %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/style.css">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">{{ site.title }}</a>
            {% if site.subtitle %}
            <span class="navbar-text d-none d-md-block text-light opacity-75">{{ site.subtitle }}</span>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1"><strong>{{ site.title }}</strong></p>
            {% if site.email %}
            <p class="mb-1"><a href="mailto:{{ site.email }}" class="text-light">{{ site.email }}</a></p>
            {% endif %}
            <p class="mb-0 opacity-50 small">Generado el {{ build_date }}</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
