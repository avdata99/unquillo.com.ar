name: Build and Deploy Site

on:
  schedule:
    - cron: '0 8 * * *'  # Once a day at 08:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Build site
        working-directory: engine
        run: python -m multitheme.cli build --config ../site.yaml --output ../docs/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --quiet --cached || git commit -m "Update site content [automated]"
          git push
