name: Build and Deploy Site

on:
  schedule:
    - cron: '0 8,16 * * *'  # Twice a day at 08:00 and 16:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install engine
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ENGINE_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          pip install git+ssh://git@github.com/avdata99/multisite-engine.git

      - name: Build site
        run: multitheme build --config site.yaml --output docs/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/
          git diff --quiet --cached || git commit -m "Update site content [automated]"
          git push
